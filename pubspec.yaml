name: peerconnect
description: "PeerConnect - A social networking app built with Flutter & Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.7

  # Google Sign-In
  google_sign_in: ^6.2.2

  # State Management
  provider: ^6.1.4

  # Google Fonts
  google_fonts: ^6.2.1
  image_picker: ^1.2.1
  firebase_storage: ^12.4.7
  image_cropper: ^12.2.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

# App launcher icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Final_profile_logo.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/Final_profile_logo.png"
